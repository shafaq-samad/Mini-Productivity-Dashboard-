<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orbit — Premium Productivity Dashboard</title>
  <meta name="description" content="A high-end, private productivity tool for managing tasks, habits, and focus.">
  
  <!-- Google Fonts: Syne, DM Sans, JetBrains Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=JetBrains+Mono:wght@400;700;800&family=Syne:wght@400..800&display=swap" rel="stylesheet">
  
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Animated Background Canvas -->
  <canvas id="starfield" class="background-canvas"></canvas>

  <!-- Custom Cursor -->
  <div class="cursor-dot"></div>

  <div class="app-container app-surface">
    <!-- Sidebar Navigation -->
    <aside class="sidebar">
      <input type="checkbox" id="mobile-menu-toggle" hidden>
      <div class="brand">
        <div style="display: flex; align-items: center; gap: 16px;">
          <div class="brand-icon">
            <div class="orbital-ring"></div>
            <i class="fas fa-rocket"></i>
          </div>
          <h1 class="brand-name">Orbit</h1>
        </div>
        <label for="mobile-menu-toggle" class="hamburger-btn">
          <i class="fas fa-bars"></i>
        </label>
      </div>
      <div class="mobile-menu-collapse">

      <nav class="nav-group">
        <div class="nav-item active" onclick="location.reload(); document.getElementById('mobile-menu-toggle').checked = false;">
          <div class="nav-highlight"></div>
          <i class="fas fa-home"></i>
          <span>Dashboard</span>
        </div>
        <div class="nav-item" onclick="document.getElementById('todo-section').scrollIntoView({behavior:'smooth'}); document.getElementById('mobile-menu-toggle').checked = false;">
          <div class="nav-highlight"></div>
          <i class="fas fa-check-circle"></i>
          <span>Tasks</span>
        </div>
        <div class="nav-item" onclick="document.getElementById('pom-section').scrollIntoView({behavior:'smooth'}); document.getElementById('mobile-menu-toggle').checked = false;">
          <div class="nav-highlight"></div>
          <i class="fas fa-clock"></i>
          <span>Focus</span>
        </div>
        <div class="nav-item" onclick="document.getElementById('notes-section').scrollIntoView({behavior:'smooth'}); document.getElementById('mobile-menu-toggle').checked = false;">
          <div class="nav-highlight"></div>
          <i class="fas fa-sticky-note"></i>
          <span>Notes</span>
        </div>
        <div class="nav-item" onclick="document.getElementById('habit-section').scrollIntoView({behavior:'smooth'}); document.getElementById('mobile-menu-toggle').checked = false;">
          <div class="nav-highlight"></div>
          <i class="fas fa-calendar-check"></i>
          <span>Habits</span>
        </div>
      </nav>

      <div class="sidebar-actions">
        <button class="btn btn-outline" id="exportBtn">
          <i class="fas fa-download"></i> Export Data
        </button>
        <button class="btn btn-outline" id="importBtn">
          <i class="fas fa-upload"></i> Import Data
        </button>
        <button class="btn btn-ghost danger-text" id="resetBtn">
          <i class="fas fa-trash"></i> Reset System
        </button>
      </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="dashboard">
      <header class="header-row">
        <div class="welcome-section">
          <h1>Focus on What Matters</h1>
          <p>Your local workspace is ready. All data is kept private.</p>
        </div>
        <div class="actions-group">
          <button class="btn btn-primary glow-button" id="startTour">
            <span>Get Started</span>
            <i class="fas fa-arrow-right"></i>
          </button>
        </div>
      </header>

      <!-- Stats Overview -->
      <section class="stats-grid">
        <div class="stat-card">
          <div class="ambient-glow bg-cyan"></div>
          <span class="stat-label">Tasks Pending</span>
          <span class="stat-value" id="pendingTasksCount">0</span>
        </div>
        <div class="stat-card">
          <div class="ambient-glow bg-indigo"></div>
          <span class="stat-label">Habits Today</span>
          <span class="stat-value" id="habitsTodayCount">0</span>
        </div>
        <div class="stat-card">
          <div class="ambient-glow bg-purple"></div>
          <span class="stat-label">Focus Sessions</span>
          <span class="stat-value" id="focusSessionsCount">0</span>
        </div>
        <div class="stat-card">
          <div class="ambient-glow bg-emerald"></div>
          <span class="stat-label">Productivity Score</span>
          <span class="stat-value" id="productivityScore">85%</span>
        </div>
      </section>

      <!-- Tools Grid -->
      <section class="tools-grid">
        <!-- To-Do Tool -->
        <div class="tool-card glass-card" id="todo-section">
          <div class="card-header">
            <div class="header-accent"></div>
            <h3><i class="fas fa-list-ul"></i> Active Tasks</h3>
          </div>
          <div class="todo-input-group">
            <input type="text" id="todoInput" placeholder="What needs to be done?" class="glowing-input">
            <button class="btn btn-primary icon-btn" id="addTodo">
              <i class="fas fa-plus"></i>
            </button>
          </div>
          <div class="todo-list" id="todoList">
            <!-- Tasks will be injected here -->
          </div>
        </div>

        <!-- Pomodoro Tool -->
        <div class="tool-card glass-card" id="pom-section">
          <div class="card-header">
            <div class="header-accent"></div>
            <h3><i class="fas fa-hourglass-half"></i> Focus Timer</h3>
          </div>
          <div class="pomodoro-container">
            <div class="timer-display-wrapper">
              <svg class="progress-ring" width="220" height="220">
                <circle class="progress-ring__track" cx="110" cy="110" r="94"></circle>
                <circle class="progress-ring__circle" id="pomRing" cx="110" cy="110" r="94"></circle>
              </svg>
              <div class="timer-display">
                <span class="mode-badge" id="pomMode">Work</span>
                <span class="time" id="pomTimer">25:00</span>
              </div>
            </div>
            
            <div class="pomodoro-controls">
              <button class="btn btn-primary round-btn" id="pomStart">
                <i class="fas fa-play"></i>
              </button>
              <button class="btn btn-outline round-btn" id="pomPause">
                <i class="fas fa-pause"></i>
              </button>
              <button class="btn btn-ghost round-btn" id="pomReset">
                <i class="fas fa-redo"></i>
              </button>
            </div>
            <div class="pomodoro-settings">
              <div class="input-col">
                <label class="stat-label">Work (min)</label>
                <input type="number" id="workDuration" value="25" class="glowing-input small-input">
              </div>
              <div class="input-col">
                <label class="stat-label">Break (min)</label>
                <input type="number" id="breakDuration" value="5" class="glowing-input small-input">
              </div>
            </div>
            <button class="btn btn-outline full-width" id="saveDur">Apply Settings</button>
          </div>
        </div>

        <!-- Notes Tool -->
        <div class="tool-card glass-card col-span-2" id="notes-section">
          <div class="card-header">
            <div class="header-accent"></div>
            <h3><i class="fas fa-pen-fancy"></i> Quick Thoughts</h3>
          </div>
          <div class="notes-input-area">
            <textarea id="noteInput" placeholder="Jot something down..." class="glowing-textarea"></textarea>
            <div class="notes-actions">
              <button class="btn btn-primary" id="saveNote">Save Note</button>
              <button class="btn btn-ghost danger-text" id="clearNotes">Clear All</button>
            </div>
          </div>
          <div class="notes-container" id="notesGrid">
            <!-- Notes will be injected here -->
          </div>
        </div>

        <!-- Habits Tool -->
        <div class="tool-card glass-card col-span-2" id="habit-section">
          <div class="card-header">
            <div class="header-accent"></div>
            <h3><i class="fas fa-chart-line"></i> Consistency Tracker</h3>
          </div>
          <div class="todo-input-group habit-input-group">
            <input type="text" id="habitName" placeholder="New habit to build..." class="glowing-input">
            <button class="btn btn-primary" id="addHabit">Track</button>
          </div>
          <div class="habit-grid" id="habitList">
            <!-- Habits will be injected here -->
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
